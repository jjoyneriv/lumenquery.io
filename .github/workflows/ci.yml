name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            portal/package-lock.json
            rpc-gateway/package-lock.json
            api-gateway/package-lock.json

      - name: Install portal dependencies
        working-directory: portal
        run: npm ci

      - name: Type check portal
        working-directory: portal
        run: npx tsc --noEmit

      - name: Install rpc-gateway dependencies
        working-directory: rpc-gateway
        run: npm ci

      - name: Type check rpc-gateway
        working-directory: rpc-gateway
        run: npx tsc --noEmit

  build-portal:
    name: Build Portal
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        working-directory: portal
        run: npm ci

      - name: Build Next.js app
        working-directory: portal
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build portal image
        uses: docker/build-push-action@v5
        with:
          context: ./portal
          push: false
          tags: lumenquery-portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build rpc-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./rpc-gateway
          push: false
          tags: lumenquery-rpc-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: false
          tags: lumenquery-api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        working-directory: portal
        run: npm ci

      - name: Run tests
        working-directory: portal
        run: npm test --if-present

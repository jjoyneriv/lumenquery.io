http:
  routers:
    portal:
      rule: "Host(`lumenquery.io`) || Host(`www.lumenquery.io`)"
      service: portal
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - compress
        - security-headers
        - rate-limit

    api:
      rule: "Host(`api.lumenquery.io`)"
      service: api-gateway
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - compress
        - security-headers
        - api-rate-limit

    rpc:
      rule: "Host(`rpc.lumenquery.io`)"
      service: rpc-gateway
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - compress
        - security-headers
        - rpc-rate-limit

    # Note: monitoring.lumenquery.io is hosted on mon1.lumenquery.io

  services:
    portal:
      loadBalancer:
        servers:
          - url: "http://lumenquery-portal:3000"

    api-gateway:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"

    rpc-gateway:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8082"

  middlewares:
    compress:
      compress:
        excludedContentTypes:
          - image/png
          - image/jpeg
          - image/gif
          - image/webp

    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), interest-cohort=()"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    api-rate-limit:
      rateLimit:
        average: 200
        burst: 100
        period: 1m

    rpc-rate-limit:
      rateLimit:
        average: 200
        burst: 100
        period: 1m

# ===========================================
# Exporters for api1.lumenquery.io
# ===========================================
# Deploy this on the application server (api1)
# Exposes metrics for Prometheus on mon1 to scrape

version: '3.8'

services:
  # Node exporter for host metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      # Bind to private IP or use firewall to restrict access
      - "9100:9100"
    networks:
      - lumenquery-network

  # cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "9080:8080"
    networks:
      - lumenquery-network

  # PostgreSQL exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_URI=lumenquery-postgres:5432/lumenquery?sslmode=disable
      - DATA_SOURCE_USER=${POSTGRES_USER:-postgres}
      - DATA_SOURCE_PASS=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "9187:9187"
    networks:
      - lumenquery-network

  # Redis exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://lumenquery-redis:6379
    ports:
      - "9121:9121"
    networks:
      - lumenquery-network

networks:
  lumenquery-network:
    external: true

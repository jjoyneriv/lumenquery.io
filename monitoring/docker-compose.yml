version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: lumenquery-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - lumenquery-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: lumenquery-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitoring.lumenquery.io
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - lumenquery-network
    depends_on:
      - prometheus

  # Node exporter for host metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: lumenquery-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - lumenquery-network

  # cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: lumenquery-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - lumenquery-network

  # PostgreSQL exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: lumenquery-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_URI=lumenquery-postgres:5432/lumenquery?sslmode=disable
      - DATA_SOURCE_USER=${POSTGRES_USER:-postgres}
      - DATA_SOURCE_PASS=${POSTGRES_PASSWORD:-postgres}
    networks:
      - lumenquery-network

  # Redis exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: lumenquery-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://lumenquery-redis:6379
    networks:
      - lumenquery-network

networks:
  lumenquery-network:
    external: true

volumes:
  prometheus-data:
  grafana-data:

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ===========================================
  # Remote targets on api1.lumenquery.io
  # ===========================================

  # Portal metrics endpoint
  - job_name: 'portal'
    metrics_path: /api/metrics
    scheme: https
    static_configs:
      - targets: ['lumenquery.io']
        labels:
          server: 'api1'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'portal'

  # RPC Gateway (internal - requires SSH tunnel or VPN)
  - job_name: 'rpc-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['api1.lumenquery.io:8082']
        labels:
          server: 'api1'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'rpc-gateway'

  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['api1.lumenquery.io:8081']
        labels:
          server: 'api1'

  # ===========================================
  # Local monitoring server (mon1.lumenquery.io)
  # ===========================================

  # Node exporter for monitoring host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          server: 'mon1'

  # ===========================================
  # Remote exporters on api1 (via node-exporter-proxy)
  # Configure these after setting up remote access
  # ===========================================

  # Remote node exporter (api1)
  - job_name: 'node-api1'
    static_configs:
      - targets: ['api1.lumenquery.io:9100']
        labels:
          server: 'api1'

  # Remote PostgreSQL exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['api1.lumenquery.io:9187']
        labels:
          server: 'api1'

  # Remote Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['api1.lumenquery.io:9121']
        labels:
          server: 'api1'

  # Remote cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['api1.lumenquery.io:9080']
        labels:
          server: 'api1'

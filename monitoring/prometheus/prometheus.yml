global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Portal health endpoint
  - job_name: 'portal'
    metrics_path: /api/metrics
    static_configs:
      - targets: ['lumenquery-portal:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'portal'

  # RPC Gateway
  - job_name: 'rpc-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['lumenquery-rpc-gateway:8082']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'rpc-gateway'

  # API Gateway
  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['lumenquery-api-gateway:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-gateway'

  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['lumenquery-traefik:8080']

  # PostgreSQL (via postgres_exporter if added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis (via redis_exporter if added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node exporter for host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
